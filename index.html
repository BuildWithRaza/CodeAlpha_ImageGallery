<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Assets/icon.png" type="image/x-icon">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>My Image Gallery</h1>

    <div class="buttons">
        <button class="filter-btn" onclick="filterSelection('all')" >All</button>
        <button class="filter-btn" onclick="filterSelection('animal')">Animals</button>
        <button class="filter-btn" onclick="filterSelection('city')" >City</button>
        <button class="filter-btn" onclick="filterSelection('nature')">Nature</button>
        <button class="filter-btn" onclick="filterSelection('car')" >Car</button>
    </div>

    <div class="gallery">
        <div class="image animal">
            <img src="Images/animal1.jpg" alt="">
        </div>
        <div class="image animal">
            <img src="Images/animal2.jpg" alt="">
        </div>
        <div class="image animal">
            <img src="Images/animal3.jpg" alt="">
        </div>
        <div class="image animal">
            <img src="Images/animal4.jpg" alt="">
        </div>
        <div class="image animal">
            <img src="Images/animal5.jpg" alt="">
        </div>
       


        <div class="image city">
            <img src="Images/city1.jpg" alt="">
        </div>
        <div class="image city">
            <img src="Images/city2.jpg" alt="">
        </div>
        <div class="image city">
            <img src="Images/city3.jpg" alt="">
        </div>
        <div class="image city">
            <img src="Images/city4.jpg" alt="">
        </div>
        <div class="image city">
            <img src="Images/city5.jpg" alt="">
        </div>
       

        <div class="image nature">
            <img src="Images/nature1.jpg" alt="">
        </div>
        <div class="image nature">
            <img src="Images/nature2.jpg" alt="">
        </div>
        <div class="image nature">
            <img src="Images/nature3.jpg" alt="">
        </div>
        <div class="image nature">
            <img src="Images/nature4.jpg" alt="">
        </div>
        <div class="image nature">
            <img src="Images/nature5.jpg" alt="">
        </div>
     

        <div class="image car">
            <img src="Images/car1.jpg" alt="">
        </div>
        <div class="image car">
            <img src="Images/car2.jpg" alt="">
        </div>
        <div class="image car">
            <img src="Images/car3.jpg" alt="">
        </div>
        <div class="image car">
            <img src="Images/car4.jpg" alt="">
        </div>
        <div class="image car">
            <img src="Images/car5.jpg" alt="">
        </div>
       



    </div>

    <div id="lightBox">
        <div class="close">
            <img width="40px" src="Assets/close.svg" alt="">
        </div>
        <div class="previous">
            <img width="40px" src="Assets/previous.svg" alt="">
        </div>
        <div class="lightBoxImage">
            <img src="" alt="">
        </div>
        <div class="next">
            <img width="40px" src="Assets/next.svg" alt="">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
